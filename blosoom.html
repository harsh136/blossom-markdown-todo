<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blossom — Minimal Markdown To-Do</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FDFDFD;
      --text: #333333;
      --muted: #A0A0A0;
      --pink: #E07AAB;
      --pink-light: #F4B8D3;
      --pink-hover: #FFF5F9;
      --red: #FA7070;
      --red-light: #FFC2C2;
      --red-hover: #FFF0F0;
      --border: #EAEAEA;
      --hover-bg: #F4F4F4;
      --overlay-bg: rgba(253, 253, 253, 0.92);
    }

    body.dark {
      --bg: #1E1E1E;
      --text: #CFCFCF;
      --muted: #7A7A7A;
      --pink: #CC7399;
      --pink-light: #6A3A4F;
      --pink-hover: #2B2024;
      --red: #D66767;
      --red-light: #6A3333;
      --red-hover: #2B1D1D;
      --border: #2D2D2D;
      --hover-bg: #282828;
      --overlay-bg: rgba(30, 30, 30, 0.92);
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', Helvetica Neue, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── SMOOTH THEME TRANSITIONS ───────────── */
    body,
    .task-input,
    .task-input-row,
    .stats-bar,
    .stats-dot,
    .brand,
    .clock,
    .tree-overlay-header,
    .tree-level-badge,
    .empty-state {
      transition: background-color 0.4s ease, border-color 0.4s ease, color 0.4s ease;
    }

    /* ─── LAYOUT ─────────────────────────────── */
    #app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 80px;
    }

    .header-bar {
      width: 100%;
      max-width: 1050px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 48px;
      gap: 16px;
    }

    .brand {
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.05em;
      padding-top: 6px;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .theme-toggle {
      font-family: 'Fira Code', monospace;
      font-size: 12px;
      color: var(--muted);
      background: transparent;
      border: none;
      cursor: pointer;
      transition: color 0.15s;
      padding-top: 6px;
    }

    .theme-toggle:hover {
      color: var(--text);
    }

    .app-layout {
      width: 100%;
      max-width: 1050px;
      display: flex;
      gap: 64px;
      align-items: flex-start;
      justify-content: center;
    }

    /* ─── CLOCK ──────────────────────────────── */
    .clock {
      display: flex;
      align-items: center;
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      color: var(--muted);
      user-select: none;
      padding-top: 6px;
      letter-spacing: 0.02em;
    }

    .clock-bracket { line-height: 16px; margin: 0 4px; }
    .clock-sep { line-height: 16px; margin: 0 1px; }
    
    .digit-group { display: flex; }
    
    .digit-slot {
      width: 8px;
      height: 16px;
      overflow: hidden;
      position: relative;
    }
    
    .digit-track {
      display: flex;
      flex-direction: column;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .digit-cell {
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    /* ─── MAIN CONTENT ───────────────────────── */
    .main-col {
      width: 100%;
      flex: 1;
      max-width: 600px;
    }

    /* ─── INPUT ──────────────────────────────── */
    .task-input-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 20px;
    }

    .task-input-prefix {
      font-family: 'Fira Code', monospace;
      font-size: 15px;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .task-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      color: var(--text);
      caret-color: var(--pink);
    }

    .task-input::placeholder {
      color: var(--muted);
    }

    /* ─── TASK LIST ──────────────────────────── */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px 9px 8px;
      border-radius: 6px;
      cursor: pointer;
      position: relative;
      transition: background 0.15s;
      min-height: 40px;
    }

    .task-item:hover {
      background: var(--hover-bg);
    }

    .task-bracket {
      font-family: 'Fira Code', monospace;
      font-size: 14px;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
      transition: color 0.2s;
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .task-text {
      flex: 1;
      font-size: 15px;
      color: var(--text);
      transition: color 0.2s, text-decoration 0.2s;
      line-height: 1.5;
    }

    /* Completed */
    .task-item.completed .task-bracket { color: var(--pink); }
    .task-item.completed .task-text {
      color: var(--pink);
      text-decoration: line-through;
      text-decoration-color: var(--pink-light);
    }

    /* Failed */
    .task-item.failed .task-bracket { color: var(--red); }
    .task-item.failed .task-text {
      color: var(--muted);
      text-decoration: line-through;
      text-decoration-color: var(--red-light);
    }

    /* ─── FAIL / DELETE BUTTONS ──────────────── */
    .task-actions {
      display: flex;
      gap: 6px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }

    .task-item:hover .task-actions {
      opacity: 1;
      pointer-events: all;
    }

    .btn-fail, .btn-delete {
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
      background: transparent;
    }

    .btn-fail {
      color: var(--red);
      border-color: var(--red-light);
    }
    .btn-fail:hover { background: var(--red-hover); }

    .btn-delete {
      color: var(--muted);
      border-color: var(--border);
    }
    .btn-delete:hover { background: var(--hover-bg); color: var(--text); }

    /* ─── STATS BAR ──────────────────────────── */
    .stats-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-top: 36px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-family: 'Fira Code', monospace;
      font-size: 12px;
      color: var(--muted);
    }

    .stats-bar span { display: flex; align-items: center; gap: 5px; }
    .stats-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    .tree-toggle-wrap {
      display: flex;
      justify-content: center;
      margin-top: 16px;
    }

    .tree-toggle-btn {
      font-family: 'Fira Code', monospace;
      font-size: 12px;
      color: var(--muted);
      background: none;
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 4px 12px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      white-space: nowrap;
    }

    .tree-toggle-btn:hover {
      color: var(--pink);
      border-color: var(--pink-light);
      background: var(--pink-hover);
    }

    /* ─── BOTTOM ACTIONS ─────────────────────── */
    .bottom-actions {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 16px;
    }

    .action-btn {
      font-family: 'Fira Code', monospace;
      font-size: 12px;
      color: var(--muted);
      background: transparent;
      border: none;
      cursor: pointer;
      transition: color 0.15s;
      padding: 0;
    }

    .action-btn:hover { color: var(--text); }
    .action-btn.danger:hover { color: var(--red); }

    /* ─── EMPTY STATE ────────────────────────── */
    .empty-state {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      padding: 48px 0;
      font-family: 'Fira Code', monospace;
    }

    /* ─── TREE CONTAINER (Overlay on Mobile, Panel on Desktop) */
    .tree-container {
      position: fixed;
      inset: 0;
      background: var(--overlay-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, background-color 0.4s ease;
    }

    .tree-container.visible {
      opacity: 1;
      pointer-events: all;
    }

    .tree-overlay-header {
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .tree-close-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 4px 12px;
      font-family: 'Fira Code', monospace;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .tree-close-btn:hover { color: var(--text); border-color: var(--muted); }

    .tree-canvas-wrap {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      gap: 16px;
    }

    #treeCanvas {
      display: block;
      border-radius: 16px;
      cursor: grab;
      width: 100%;
      max-width: 560px;
      height: auto;
    }
    #treeCanvas:active {
      cursor: grabbing;
    }

    .tree-level-badge {
      font-family: 'Fira Code', monospace;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      text-align: center;
    }

    /* ─── DESKTOP LAYOUT OVERRIDES ───────────── */
    @media (min-width: 900px) {
      .tree-container {
        position: relative;
        inset: auto;
        background: transparent;
        backdrop-filter: none;
        opacity: 1;
        pointer-events: all;
        flex-shrink: 0;
        width: 440px;
      }
      .tree-close-btn { display: none; }
      .tree-toggle-wrap { display: none; }
    }

    /* ─── FALLING LEAF ANIMATION ─────────────── */
    @keyframes fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      70%  { opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    .falling-petal {
      position: fixed;
      width: 8px;
      height: 8px;
      border-radius: 50% 0 50% 0;
      pointer-events: none;
      z-index: 200;
      animation: fall linear forwards;
    }

    /* ─── TASK ADD ANIMATION ─────────────────── */
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .task-item { animation: slideIn 0.2s ease; }

  </style>
</head>
<body>
<div id="app">
  <!-- HEADER -->
  <div class="header-bar">
    <div class="brand">// blossom.todo</div>
    <div class="header-controls">
      <button class="theme-toggle" id="themeToggleBtn">[ dark ]</button>
      <div class="clock" id="clock">
        <span class="clock-bracket">[</span>
        <div class="digit-group" id="dg-h"></div>
        <span class="clock-sep">:</span>
        <div class="digit-group" id="dg-m"></div>
        <span class="clock-sep">:</span>
        <div class="digit-group" id="dg-s"></div>
        <span class="clock-bracket">]</span>
      </div>
    </div>
  </div>

  <div class="app-layout">
    <!-- MAIN TODO LIST -->
    <main class="main-col">
      <div class="task-input-row">
        <span class="task-input-prefix">[ ]</span>
        <input class="task-input" id="taskInput" type="text" placeholder="Add a task..." autocomplete="off" spellcheck="false" />
      </div>

      <div class="task-list" id="taskList"></div>

      <div class="stats-bar" id="statsBar">
        <span><span class="stats-dot" style="background:var(--muted)"></span> <span id="statPending">0 pending</span></span>
        <span><span class="stats-dot" style="background:var(--pink)"></span> <span id="statDone">0 done</span></span>
        <span><span class="stats-dot" style="background:var(--red)"></span> <span id="statFailed">0 failed</span></span>
      </div>

      <div class="bottom-actions">
        <button class="action-btn" id="clearTasksBtn">[ clear tasks ]</button>
        <button class="action-btn danger" id="resetTreeBtn">[ start fresh ]</button>
      </div>

      <div class="tree-toggle-wrap">
        <button class="tree-toggle-btn" id="treeToggleBtn">[ View Tree ]</button>
      </div>
    </main>

    <!-- TREE OVERLAY / PANEL -->
    <aside class="tree-container" id="treeContainer">
      <div class="tree-overlay-header">
        <span id="treeStatusLabel">🌸 cherry blossom</span>
      </div>
      <div class="tree-canvas-wrap">
        <canvas id="treeCanvas" width="560" height="640"></canvas>
        <div class="tree-level-badge" id="treeLevelBadge"></div>
        <button class="tree-close-btn" id="treeCloseBtn">[ Close ]</button>
      </div>
    </aside>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   1. LOTTERY CLOCK
═══════════════════════════════════════════════════ */
function makeDG(parentId, count) {
  const p = document.getElementById(parentId);
  for (let i = 0; i < count; i++) {
    const slot = document.createElement('div');
    slot.className = 'digit-slot';
    const track = document.createElement('div');
    track.className = 'digit-track';
    for (let j = 0; j < 3; j++) {
      const cell = document.createElement('div');
      cell.className = 'digit-cell';
      cell.textContent = '0';
      track.appendChild(cell);
    }
    slot.appendChild(track);
    p.appendChild(slot);
  }
}

makeDG('dg-h', 2);
makeDG('dg-m', 2);
makeDG('dg-s', 2);

function setDigit(groupId, digitIndex, val) {
  const group = document.getElementById(groupId);
  const slot = group.children[digitIndex];
  const track = slot.children[0];
  const cells = track.children;
  const prev = parseInt(cells[1].textContent) || 0;
  if (prev === val) return;
  const next = val;
  
  cells[0].textContent = prev;
  cells[1].textContent = prev;
  cells[2].textContent = next;
  
  track.style.transition = 'none';
  track.style.transform = 'translateY(0)';
  
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      track.style.transition = 'transform 0.35s cubic-bezier(0.4, 0, 0.2, 1)';
      track.style.transform = 'translateY(-16px)';
      setTimeout(() => {
        track.style.transition = 'none';
        cells[0].textContent = next;
        cells[1].textContent = next;
        cells[2].textContent = next;
        track.style.transform = 'translateY(0)';
      }, 370);
    });
  });
}

function updateClock() {
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const timeStr = [pad(now.getHours()), pad(now.getMinutes()), pad(now.getSeconds())];
  
  ['dg-h', 'dg-m', 'dg-s'].forEach((id, idx) => {
    setDigit(id, 0, parseInt(timeStr[idx][0]));
    setDigit(id, 1, parseInt(timeStr[idx][1]));
  });
}
setInterval(updateClock, 1000);
updateClock();

/* ═══════════════════════════════════════════════════
   2. TO-DO LIST
═══════════════════════════════════════════════════ */
let tasks = [];

function loadTasks() {
  try { tasks = JSON.parse(localStorage.getItem('blossom_tasks') || '[]'); } catch(e) { tasks = []; }
}

function saveTasks() {
  localStorage.setItem('blossom_tasks', JSON.stringify(tasks));
}

function getTreeState() {
  try { 
    const state = JSON.parse(localStorage.getItem('blossom_tree') || 'null');
    if (state) {
      // Migrate old state trees to taller version (trunk 5 -> 8)
      if (!state.version) {
        state.leafBlocks.forEach(lb => lb.y += 3);
        state.version = 2;
        saveTreeState(state);
      }
      return state;
    }
    return defaultTreeState(); 
  }
  catch(e) { return defaultTreeState(); }
}

function saveTreeState(ts) {
  localStorage.setItem('blossom_tree', JSON.stringify(ts));
}

function defaultTreeState() {
  return {
    version: 2,
    completedCount: 0,
    failedCount: 0,
    canopyRadius: 2,
    leafBlocks: generateInitialLeaves(2),
    fallenLeaves: []
  };
}

loadTasks();

function renderTasks() {
  const list = document.getElementById('taskList');
  list.innerHTML = '';

  if (tasks.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = '// nothing here yet';
    list.appendChild(empty);
  } else {
    tasks.forEach((task, idx) => {
      const item = document.createElement('div');
      item.className = 'task-item ' + (task.status === 'done' ? 'completed' : task.status === 'failed' ? 'failed' : '');
      item.setAttribute('data-idx', idx);

      const bracket = document.createElement('span');
      bracket.className = 'task-bracket';
      bracket.textContent = task.status === 'done' ? '[x]' : task.status === 'failed' ? '[-]' : '[ ]';

      const text = document.createElement('span');
      text.className = 'task-text';
      text.textContent = task.text;

      const actions = document.createElement('div');
      actions.className = 'task-actions';

      if (task.status !== 'failed') {
        const failBtn = document.createElement('button');
        failBtn.className = 'btn-fail';
        failBtn.textContent = '[fail]';
        failBtn.addEventListener('click', e => { e.stopPropagation(); markFailed(idx); });
        actions.appendChild(failBtn);
      }

      const delBtn = document.createElement('button');
      delBtn.className = 'btn-delete';
      delBtn.textContent = '[×]';
      delBtn.addEventListener('click', e => { e.stopPropagation(); deleteTask(idx); });
      actions.appendChild(delBtn);

      item.appendChild(bracket);
      item.appendChild(text);
      item.appendChild(actions);

      item.addEventListener('click', () => toggleTask(idx));
      list.appendChild(item);
    });
  }

  updateStats();
}

function updateStats() {
  const pending = tasks.filter(t => t.status === 'pending').length;
  const done = tasks.filter(t => t.status === 'done').length;
  const failed = tasks.filter(t => t.status === 'failed').length;
  document.getElementById('statPending').textContent = pending + ' pending';
  document.getElementById('statDone').textContent = done + ' done';
  document.getElementById('statFailed').textContent = failed + ' failed';
}

function addTask(text) {
  if (!text.trim()) return;
  tasks.unshift({ id: Date.now(), text: text.trim(), status: 'pending' });
  saveTasks();
  renderTasks();
}

function toggleTask(idx) {
  if (tasks[idx].status === 'done') {
    tasks[idx].status = 'pending';
  } else if (tasks[idx].status === 'pending') {
    tasks[idx].status = 'done';
    const ts = getTreeState();
    ts.completedCount++;
    ts.canopyRadius = Math.min(2 + ts.completedCount * 0.2, 6);
    const newLeaves = addCanopyLeaves(ts.leafBlocks, ts.canopyRadius, 7);
    ts.leafBlocks = newLeaves;
    saveTreeState(ts);
  }
  saveTasks();
  renderTasks();
}

function isTreeVisible() {
  return window.innerWidth >= 900 || document.getElementById('treeContainer').classList.contains('visible');
}

function markFailed(idx) {
  if (tasks[idx].status === 'failed') return;
  tasks[idx].status = 'failed';
  const ts = getTreeState();
  ts.failedCount++;
  
  const removeCount = Math.min(3 + Math.floor(Math.random()*3), ts.leafBlocks.length);
  const removed = [];
  for (let i = 0; i < removeCount; i++) {
    if (ts.leafBlocks.length === 0) break;
    const ri = Math.floor(Math.random() * ts.leafBlocks.length);
    removed.push(ts.leafBlocks.splice(ri, 1)[0]);
  }
  
  for (let i = 0; i < Math.min(removeCount, 3); i++) {
    const fl = randomPlatformPos();
    fl.color = pinkPalette[Math.floor(Math.random() * pinkPalette.length)];
    ts.fallenLeaves.push(fl);
  }
  saveTreeState(ts);
  
  // Only spawn falling petals when the user can see the tree
  if (isTreeVisible()) {
    spawnFallingPetals(removeCount);
  }
  
  saveTasks();
  renderTasks();
}

function deleteTask(idx) {
  tasks.splice(idx, 1);
  saveTasks();
  renderTasks();
}

document.getElementById('taskInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    addTask(e.target.value);
    e.target.value = '';
  }
});

/* ═══════════════════════════════════════════════════
   3. FALLING PETALS EFFECT
═══════════════════════════════════════════════════ */
const pinkPalette = ['#F4A6C8','#E57EAC','#D15B8F','#B24075'];

function spawnFallingPetals(count) {
  for (let i = 0; i < count * 3; i++) {
    setTimeout(() => {
      const petal = document.createElement('div');
      petal.className = 'falling-petal';
      petal.style.left = (10 + Math.random() * 80) + 'vw';
      petal.style.top = '-20px';
      petal.style.background = pinkPalette[Math.floor(Math.random() * pinkPalette.length)];
      petal.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      petal.style.animationDelay = (Math.random() * 0.5) + 's';
      document.body.appendChild(petal);
      setTimeout(() => petal.remove(), 4000);
    }, i * 80);
  }
}

/* ═══════════════════════════════════════════════════
   4. VOXEL TREE RENDERER & 3D ENGINE
═══════════════════════════════════════════════════ */
const ISO_W = 24; 
const ISO_H = 12; 
const ISO_DEPTH = 10; 
const PLATFORM_SIZE = 15; // Increased size to center correctly around 7

const TRUNK_DARK = '#4A3123';
const TRUNK_MED  = '#3A2519';
const TRUNK_LIGHT = '#5C3D28';
const PLATFORM_WHITE = '#F2F4F0';
const PLATFORM_LG    = '#A0D189';
const PLATFORM_DG    = '#60A34D';

let treeAngle = 0;

// --- ENVIRONMENT SETTINGS (SKY, STARS, CELESTIAL) ---
const SKY_COLORS = [
  { h: 0,  top: [15,32,39],    bot: [32,58,67] },      // Deep Night
  { h: 5,  top: [15,32,39],    bot: [32,58,67] },      // Deep Night
  { h: 6.5,top: [255,183,178], bot: [255,230,240] },   // Dawn
  { h: 8,  top: [140,200,255], bot: [230,244,255] },   // Day
  { h: 16, top: [140,200,255], bot: [230,244,255] },   // Day
  { h: 18.5, top: [255,154,139], bot: [255,195,160] }, // Sunset
  { h: 20, top: [15,32,39],    bot: [32,58,67] },      // Deep Night Start
  { h: 24, top: [15,32,39],    bot: [32,58,67] }       // Midnight
];

const envStars = Array.from({length: 80}, () => ({
  x: Math.random() * 560,
  y: Math.random() * 520 * 0.8,
  r: Math.random() * 1.5 + 0.5,
  twinkle: Math.random() * Math.PI * 2
}));

function lerpColor(c1, c2, t) {
  return `rgb(${Math.round(c1[0] + (c2[0] - c1[0]) * t)}, ${Math.round(c1[1] + (c2[1] - c1[1]) * t)}, ${Math.round(c1[2] + (c2[2] - c1[2]) * t)})`;
}

function getSkyColor(fh) {
  for (let i = 0; i < SKY_COLORS.length - 1; i++) {
    if (fh >= SKY_COLORS[i].h && fh <= SKY_COLORS[i+1].h) {
      const t = (fh - SKY_COLORS[i].h) / (SKY_COLORS[i+1].h - SKY_COLORS[i].h);
      return {
        top: lerpColor(SKY_COLORS[i].top, SKY_COLORS[i+1].top, t),
        bot: lerpColor(SKY_COLORS[i].bot, SKY_COLORS[i+1].bot, t)
      };
    }
  }
  return { top: 'rgb(15,32,39)', bot: 'rgb(32,58,67)' };
}

function drawEnvironment(ctx, W, H) {
  const now = new Date();
  const fh = now.getHours() + now.getMinutes() / 60 + now.getSeconds() / 3600;

  // 1. Draw Sky Gradient
  const sky = getSkyColor(fh);
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, sky.top);
  grad.addColorStop(1, sky.bot);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // 2. Draw Stars
  let starOp = 0;
  if (fh < 5 || fh >= 20) starOp = 1;
  else if (fh >= 18.5 && fh < 20) starOp = (fh - 18.5) / 1.5;
  else if (fh >= 5 && fh < 6.5) starOp = 1 - (fh - 5) / 1.5;

  if (starOp > 0) {
    const t = Date.now() / 1000;
    envStars.forEach(s => {
      const tw = 0.5 + 0.5 * Math.sin(t * 2 + s.twinkle);
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 255, 255, ${starOp * tw})`;
      ctx.fill();
    });
  }

  // 3. Draw Sun / Moon Paths
  let sunProg = (fh - 5) / 14; // Arc from 5am to 7pm (19)
  if (sunProg >= -0.1 && sunProg <= 1.1) {
    const angle = Math.PI - sunProg * Math.PI;
    const arcR = 240;
    const cx = W / 2, cy = H * 0.75;
    const x = cx + Math.cos(angle) * arcR;
    const y = cy - Math.sin(angle) * arcR;

    let peak = 1 - Math.abs(sunProg - 0.5) * 2; 
    peak = Math.max(0, Math.min(1, peak));
    const r = 255;
    const g = Math.floor(154 + 101 * peak); // Blends from orange to yellow
    const b = Math.floor(139 + 116 * peak); 

    ctx.beginPath();
    ctx.arc(x, y, 22, 0, Math.PI * 2);
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.shadowBlur = 30 + 10 * peak;
    ctx.shadowColor = ctx.fillStyle;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  let moonProg = (fh >= 18) ? (fh - 18) / 13 : (fh + 24 - 18) / 13; // Arc from 6pm to 7am
  if (moonProg >= -0.1 && moonProg <= 1.1) {
    const angle = Math.PI - moonProg * Math.PI;
    const arcR = 240;
    const cx = W / 2, cy = H * 0.75;
    const x = cx + Math.cos(angle) * arcR;
    const y = cy - Math.sin(angle) * arcR;

    ctx.beginPath();
    ctx.arc(x, y, 16, 0, Math.PI * 2);
    ctx.fillStyle = '#F4F6F0';
    ctx.shadowBlur = 20;
    ctx.shadowColor = '#FFFFFF';
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function drawBlock(ctx, sx, sy, topColor, leftColor, rightColor, alpha) {
  const W2 = ISO_W / 2, H2 = ISO_H / 2;
  ctx.globalAlpha = alpha !== undefined ? alpha : 1;

  // TOP face
  ctx.beginPath();
  ctx.moveTo(sx,      sy - H2);
  ctx.lineTo(sx + W2, sy);
  ctx.lineTo(sx,      sy + H2);
  ctx.lineTo(sx - W2, sy);
  ctx.closePath();
  ctx.fillStyle = topColor;
  ctx.fill();

  // LEFT face
  ctx.beginPath();
  ctx.moveTo(sx - W2, sy);
  ctx.lineTo(sx,      sy + H2);
  ctx.lineTo(sx,      sy + H2 + ISO_DEPTH);
  ctx.lineTo(sx - W2, sy + ISO_DEPTH);
  ctx.closePath();
  ctx.fillStyle = leftColor;
  ctx.fill();

  // RIGHT face
  ctx.beginPath();
  ctx.moveTo(sx,      sy + H2);
  ctx.lineTo(sx + W2, sy);
  ctx.lineTo(sx + W2, sy + ISO_DEPTH);
  ctx.lineTo(sx,      sy + H2 + ISO_DEPTH);
  ctx.closePath();
  ctx.fillStyle = rightColor;
  ctx.fill();

  ctx.globalAlpha = 1;
}

function darken(hex, amount) {
  let r = parseInt(hex.slice(1,3),16);
  let g = parseInt(hex.slice(3,5),16);
  let b = parseInt(hex.slice(5,7),16);
  r = Math.max(0, r - amount);
  g = Math.max(0, g - amount);
  b = Math.max(0, b - amount);
  return `rgb(${r},${g},${b})`;
}

function buildPlatform() {
  const blocks = [];
  for (let x = 0; x < PLATFORM_SIZE; x++) {
    for (let z = 0; z < PLATFORM_SIZE; z++) {
      let type = 'white';
      const ex = Math.min(x, PLATFORM_SIZE-1-x);
      const ez = Math.min(z, PLATFORM_SIZE-1-z);
      const border = Math.min(ex, ez);
      if (border === 0) type = 'dg';
      else if (border === 1) type = 'lg';
      else if (border === 2) type = 'dg';
      else type = 'white';
      blocks.push({ x, z, y: 0, type });
    }
  }
  return blocks;
}

function randomPlatformPos() {
  const margin = 3;
  return {
    x: margin + Math.floor(Math.random() * (PLATFORM_SIZE - 2 * margin)),
    z: margin + Math.floor(Math.random() * (PLATFORM_SIZE - 2 * margin))
  };
}

function generateInitialLeaves(radius) {
  const leaves = [];
  const cx = 7, cz = 7;
  const trunkHeight = 8;
  for (let dx = -Math.ceil(radius); dx <= Math.ceil(radius); dx++) {
    for (let dz = -Math.ceil(radius); dz <= Math.ceil(radius); dz++) {
      for (let dy = -1; dy <= Math.ceil(radius); dy++) {
        const dist = Math.sqrt(dx*dx + dz*dz + dy*dy*0.7);
        if (dist < radius && Math.random() > 0.25) {
          leaves.push({
            x: cx + dx,
            z: cz + dz,
            y: trunkHeight + dy + 1,
            color: pinkPalette[Math.floor(Math.random() * pinkPalette.length)]
          });
        }
      }
    }
  }
  return leaves;
}

function addCanopyLeaves(existing, radius, count) {
  const cx = 7, cz = 7, trunkHeight = 8;
  const newLeaves = [...existing];
  const existSet = new Set(existing.map(l => `${l.x},${l.z},${l.y}`));
  let added = 0;
  let attempts = 0;
  while (added < count && attempts < 200) {
    attempts++;
    const angle = Math.random() * Math.PI * 2;
    const elevation = Math.random() * Math.PI - Math.PI/2;
    const r = radius * (0.7 + Math.random() * 0.3);
    const dx = Math.round(Math.cos(elevation) * Math.cos(angle) * r);
    const dz = Math.round(Math.cos(elevation) * Math.sin(angle) * r);
    const dy = Math.round(Math.sin(elevation) * r * 0.7);
    const x = cx + dx, z = cz + dz, y = trunkHeight + dy + 1;
    const key = `${x},${z},${y}`;
    if (!existSet.has(key) && y > 0) {
      existSet.add(key);
      newLeaves.push({ x, z, y, color: pinkPalette[Math.floor(Math.random() * pinkPalette.length)] });
      added++;
    }
  }
  return newLeaves;
}

function buildTrunk(height) {
  const blocks = [];
  const cx = 7, cz = 7;
  for (let y = 1; y <= height; y++) {
    blocks.push({ x: cx, z: cz, y, color: y % 2 === 0 ? TRUNK_DARK : TRUNK_MED });
  }
  return blocks;
}

function renderTree() {
  const canvas = document.getElementById('treeCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  
  // Render dynamic sky and celestial bodies instead of clearing
  drawEnvironment(ctx, W, H);

  const ts = getTreeState();
  const platform = buildPlatform();
  const trunkHeight = 8;
  const trunk = buildTrunk(trunkHeight);
  const { leafBlocks, fallenLeaves, completedCount, failedCount } = ts;

  const offX = W / 2;
  const offY = H * 0.7;

  const origTransform = ctx.getTransform();
  ctx.translate(offX, offY);

  const allBlocks = [];

  // Platform
  platform.forEach(b => {
    let top, left, right;
    if (b.type === 'white') {
      top = PLATFORM_WHITE; left = darken(PLATFORM_WHITE, 20); right = darken(PLATFORM_WHITE, 35);
    } else if (b.type === 'lg') {
      top = PLATFORM_LG; left = darken(PLATFORM_LG, 25); right = darken(PLATFORM_LG, 40);
    } else {
      top = PLATFORM_DG; left = darken(PLATFORM_DG, 20); right = darken(PLATFORM_DG, 35);
    }
    allBlocks.push({ x: b.x, z: b.z, y: b.y, top, left, right });
  });

  // Fallen leaves
  fallenLeaves.forEach(fl => {
    const top = fl.color;
    allBlocks.push({ x: fl.x, z: fl.z, y: 1, top, left: darken(top, 40), right: darken(top, 55) });
  });

  // Trunk
  trunk.forEach(b => {
    const top = TRUNK_LIGHT;
    const left = darken(b.color, 10);
    const right = darken(b.color, 20);
    allBlocks.push({ x: b.x, z: b.z, y: b.y, top, left, right });
  });

  // Leaf blocks
  leafBlocks.forEach(lb => {
    const c = lb.color;
    const left = darken(c, 25);
    const right = darken(c, 40);
    allBlocks.push({ x: lb.x, z: lb.z, y: lb.y, top: c, left, right });
  });

  // Apply 3D Rotation Matrix to coordinates before Isometric projection
  allBlocks.forEach(b => {
    // 7 is the exact center given PLATFORM_SIZE 15
    const cx = b.x - 7;
    const cz = b.z - 7;
    const rx = cx * Math.cos(treeAngle) - cz * Math.sin(treeAngle);
    const rz = cx * Math.sin(treeAngle) + cz * Math.cos(treeAngle);
    
    b.rx = rx;
    b.rz = rz;
    // Depth sorting based on rotated Isometric Z
    b.sortKey = rx + rz + b.y * 0.1;
  });

  // Sort back to front (Painters algorithm)
  allBlocks.sort((a, b) => a.sortKey - b.sortKey);

  allBlocks.forEach(b => {
    // Standard isometric mapping of rotated 3D point
    const sx = (b.rx - b.rz) * (ISO_W / 2);
    const sy = (b.rx + b.rz) * (ISO_H / 2) - b.y * ISO_DEPTH;
    drawBlock(ctx, sx, sy, b.top, b.left, b.right);
  });

  ctx.setTransform(origTransform);

  // Update badge
  const total = completedCount + failedCount;
  const rate = total > 0 ? Math.round((completedCount / total) * 100) : 100;
  const level = Math.floor(completedCount / 3) + 1;
  document.getElementById('treeLevelBadge').textContent =
    `lv.${level}  ·  ${completedCount} bloomed  ·  ${failedCount} fallen  ·  ${rate}% bloom rate`;

  const label = completedCount === 0
    ? '🌱 sapling'
    : completedCount < 5
    ? '🌸 budding'
    : completedCount < 15
    ? '🌸 blossoming'
    : '🌸 full bloom';
  document.getElementById('treeStatusLabel').textContent = label;
}

/* ═══════════════════════════════════════════════════
   5. ROTATION ANIMATION & INTERACTIVITY
═══════════════════════════════════════════════════ */
let isDragging = false;
let lastMouseX = 0;
let targetVelocity = 0.005;
let currentVelocity = 0.005;

const canvas = document.getElementById('treeCanvas');

function startDrag(x) {
  isDragging = true;
  lastMouseX = x;
  targetVelocity = 0;
  currentVelocity = 0;
}

function drag(x) {
  if (!isDragging) return;
  const deltaX = x - lastMouseX;
  treeAngle += deltaX * 0.01;
  lastMouseX = x;
}

function endDrag() {
  if (isDragging) {
    isDragging = false;
    targetVelocity = 0.005;
  }
}

// Mouse controls
canvas.addEventListener('mousedown', e => startDrag(e.clientX));
window.addEventListener('mousemove', e => drag(e.clientX));
window.addEventListener('mouseup', endDrag);

// Touch controls
canvas.addEventListener('touchstart', e => startDrag(e.touches[0].clientX), { passive: true });
window.addEventListener('touchmove', e => drag(e.touches[0].clientX), { passive: true });
window.addEventListener('touchend', endDrag);

function animationLoop() {
  if (!isDragging) {
    currentVelocity += (targetVelocity - currentVelocity) * 0.05;
    treeAngle += currentVelocity;
  }
  
  if (isTreeVisible()) {
    renderTree();
  }
  requestAnimationFrame(animationLoop);
}

// Start continuous loop
requestAnimationFrame(animationLoop);

/* ═══════════════════════════════════════════════════
   6. TREE TOGGLE (Mobile only)
═══════════════════════════════════════════════════ */
document.getElementById('treeToggleBtn').addEventListener('click', () => {
  const container = document.getElementById('treeContainer');
  container.classList.add('visible');
});

document.getElementById('treeCloseBtn').addEventListener('click', () => {
  document.getElementById('treeContainer').classList.remove('visible');
});

document.getElementById('treeContainer').addEventListener('click', e => {
  if (window.innerWidth < 900 && e.target === document.getElementById('treeContainer')) {
    document.getElementById('treeContainer').classList.remove('visible');
  }
});

/* ═══════════════════════════════════════════════════
   7. INIT & ACTIONS
═══════════════════════════════════════════════════ */
let clearTasksTimeout;
document.getElementById('clearTasksBtn').addEventListener('click', (e) => {
  const btn = e.target;
  if (btn.textContent === '[ clear tasks ]') {
    btn.textContent = '[ sure? ]';
    clearTasksTimeout = setTimeout(() => { btn.textContent = '[ clear tasks ]'; }, 3000);
    return;
  }
  clearTimeout(clearTasksTimeout);
  btn.textContent = '[ clear tasks ]';

  tasks = [];
  saveTasks();
  renderTasks();
});

let resetTreeTimeout;
document.getElementById('resetTreeBtn').addEventListener('click', (e) => {
  const btn = e.target;
  if (btn.textContent === '[ start fresh ]') {
    btn.textContent = '[ sure? ]';
    resetTreeTimeout = setTimeout(() => { btn.textContent = '[ start fresh ]'; }, 3000);
    return;
  }
  clearTimeout(resetTreeTimeout);
  btn.textContent = '[ start fresh ]';

  // Perform a full reset: clear tasks and revert tree to sapling without fallen leaves
  tasks = [];
  saveTasks();
  saveTreeState(defaultTreeState());
  renderTasks();
  renderTree(); // Instantly re-draw the fresh canvas
});

renderTasks();

if (!localStorage.getItem('blossom_tree')) {
  saveTreeState(defaultTreeState());
}

/* ═══════════════════════════════════════════════════
   8. THEME TOGGLE
═══════════════════════════════════════════════════ */
const themeBtn = document.getElementById('themeToggleBtn');
const sysThemeMediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
let currentTheme = localStorage.getItem('blossom_theme') || 'system';

function applyTheme() {
  let isDark = false;
  
  if (currentTheme === 'dark') {
    isDark = true;
  } else if (currentTheme === 'light') {
    isDark = false;
  } else {
    // Fallback to 'system'
    isDark = sysThemeMediaQuery.matches;
  }

  if (isDark) {
    document.body.classList.add('dark');
  } else {
    document.body.classList.remove('dark');
  }
  
  themeBtn.textContent = `[ ${currentTheme} ]`;
}

themeBtn.addEventListener('click', () => {
  // Cycle through themes: system -> light -> dark -> system...
  if (currentTheme === 'system') {
    currentTheme = 'light';
  } else if (currentTheme === 'light') {
    currentTheme = 'dark';
  } else {
    currentTheme = 'system';
  }
  
  localStorage.setItem('blossom_theme', currentTheme);
  applyTheme();
});

// Listen for OS-level theme changes when in 'system' mode
sysThemeMediaQuery.addEventListener('change', () => {
  if (currentTheme === 'system') {
    applyTheme();
  }
});

applyTheme();
</script>
